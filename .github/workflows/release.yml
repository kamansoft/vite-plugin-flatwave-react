name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # @semantic-release/github: create the GitHub Release and git tag
  issues: write # @semantic-release/github: comment on released issues
  pull-requests: write # @semantic-release/github: comment on released pull requests
  id-token: write # OIDC trusted publishing + automatic npm provenance (no NPM_TOKEN)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so semantic-release can analyze commits

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # ships npm >= 11.5.1, required for npm OIDC trusted publishing
          # NOTE: intentionally NO registry-url. It writes an .npmrc that conflicts with
          # semantic-release's OIDC auth (causes EINVALIDNPMTOKEN).

      - name: Show toolchain versions
        run: node -v && npm -v

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build:plugin

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
