name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # @semantic-release/github: create the GitHub Release and git tag
  id-token: write # Required for npm OIDC trusted publishing
  issues: write # @semantic-release/github: comment on released issues
  pull-requests: write # @semantic-release/github: comment on released pull requests

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so semantic-release can analyze commits

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Show toolchain versions
        run: node -v && npm -v

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Build plugin
        run: npm run build:plugin

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN needed when using OIDC trusted publishing
          # NODE_AUTH_TOKEN is not required; npm CLI will use OIDC automatically
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
